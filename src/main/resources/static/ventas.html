<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/ventas.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h1>hola mundo desde ventas </h1>

<img id="img-encabezado" src="imgs/img_proyecto_ventas_1.png" class="img-fluid" alt="...">

<table class="table table-striped">
    <thead>
    <tr>
        <th scope="col">Id</th>
        <th scope="col">ID del Cliente</th>
        <th scope="col">Monto</th>
        <th scope="col">Fecha de venta</th>
        <th scope="col">Acciones</th>
    </tr>
    </thead>
    <tbody id="ventasTableBody"></tbody>
</table>

<form id="ventaForm" class="row g-3 mt-3">
    <input type="hidden" id="ventaId">
    <div class="col-md-3">
        <input type="number" id="clienteId" class="form-control" placeholder="ID Cliente" required>
    </div>
    <div class="col-md-3">
        <input type="number" id="monto" class="form-control" placeholder="Monto" required>
    </div>
    <div class="col-md-3">
        <input type="datetime-local" id="fecha" class="form-control" placeholder="Fecha">
    </div>
    <div class="col-md-3">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <button type="button" id="cancelEdit" class="btn btn-secondary">Cancelar</button>
    </div>
</form>




<!-- script js  -->
<script src="js/ventas.js"></script>


</body>
</html>
