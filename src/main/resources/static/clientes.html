<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<div class="container mt-4">
    <!-- Título y botón al index -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Gestión de Clientes</h2>
        <a href="/index" class="btn btn-primary">Volver al Inicio</a>
    </div>

    <!-- Tabla de clientes -->
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID cliente</th>
            <th>Nombre completo</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="clientesTableBody">
        <!-- Datos se llenan desde JS -->
        </tbody>
    </table>

    <!-- Formulario para agregar/editar clientes -->
    <form id="clienteForm" class="mt-3">
        <input type="hidden" id="clienteId">
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="col-md-4">
                <input type="email" id="correo" class="form-control" placeholder="Correo" required>
            </div>
            <div class="col-md-4">
                <input type="text" id="telefono" class="form-control" placeholder="Teléfono" required>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-success" title="Agregar nuevo cliente">Agregar / Guardar</button>
            <button type="button" id="cancelEdit" class="btn btn-secondary">Cancelar</button>
        </div>
    </form>
</div>

<script src="js/clientes.js"></script>
</body>
</html>
