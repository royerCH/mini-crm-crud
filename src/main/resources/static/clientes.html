<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM - Menú</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<table class="table table-striped table-bordered mt-4">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Teléfono</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="clientesTableBody"></tbody>
</table>
<form id="clienteForm" class="row g-3 mt-3">
    <input type="hidden" id="clienteId">
    <div class="col-md-4">
        <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
    </div>
    <div class="col-md-4">
        <input type="email" id="correo" class="form-control" placeholder="Correo">
    </div>
    <div class="col-md-4">
        <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <button type="button" id="cancelEdit" class="btn btn-secondary">Cancelar</button>
    </div>
</form>
</body>
<!-- script js  -->
<script src="js/clientes.js"></script>
</html>
